<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 경쟁사 출시 분석 대시보드</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style id="main-styles">
:root {
    --bg-dark: #0f172a;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    
    /* Brand Colors */
    --brand-blue: #3b82f6;
    --brand-purple: #8b5cf6;
    --brand-pink: #ec4899;
    --brand-teal: #14b8a6;
    --brand-orange: #f97316;
    
    /* Glass Effect */
    --glass-bg: rgba(30, 41, 59, 0.4);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
    --glass-hover-border: rgba(255, 255, 255, 0.2);
    
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 8px;
    
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Background Animated Shapes */
.bg-shape {
    position: absolute;
    filter: blur(100px);
    z-index: -1;
    border-radius: 50%;
    opacity: 0.5;
    animation: float 20s infinite ease-in-out alternate;
}

.bg-shape-1 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(15,23,42,0) 70%);
    top: -200px;
    left: -100px;
}

.bg-shape-2 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
    bottom: -100px;
    right: -100px;
    animation-delay: -10s;
}

@keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(50px, 50px) scale(1.1); }
}

/* Common Layout */
.dashboard-container {
    display: flex;
    min-height: 100vh;
    padding: 24px;
    gap: 24px;
    max-width: 1920px;
    margin: 0 auto;
}

.glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--glass-shadow);
    transition: var(--transition);
}

.glass-panel:hover {
    border-color: var(--glass-hover-border);
}

/* Sidebar */
.sidebar {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
}

.logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--brand-blue), var(--brand-purple));
    border-radius: var(--radius-sm);
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
}

.logo h2 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(to right, #fff, #cbd5e1);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius-md);
    font-weight: 500;
    transition: var(--transition);
}

.nav-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    transform: translateX(4px);
}

.nav-item.active {
    background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, transparent 100%);
    color: var(--brand-blue);
    border-left: 3px solid var(--brand-blue);
}

/* Main Content */
.main-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow: hidden;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: rgba(15, 23, 42, 0.4);
    border-bottom: 1px solid var(--glass-border);
    gap: 20px;
    flex-wrap: nowrap;
    margin-bottom: 40px;
}

.header-titles {
    flex-shrink: 0;
}

.header-titles h1 {
    font-size: 1.25rem;
    font-weight: 800;
    margin: 0;
    white-space: nowrap;
    background: linear-gradient(135deg, #fff, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    display: none; /* 공간 확보를 위해 숨김 */
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-grow: 1;
    justify-content: flex-end;
    min-width: 0;
}

.search-box {
    position: relative;
    width: 200px; /* 검색창 크기 축소 */
    flex-shrink: 1;
}

.search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 0.9rem;
}

#productSearch {
    width: 100%;
    padding: 10px 14px 10px 40px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    color: white;
    font-family: inherit;
    font-size: 0.85rem;
    transition: var(--transition);
}

#productSearch:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--brand-blue);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
}

/* 필터 버튼 섹션 */
.filter-container {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none; /* Firefox */
}

.filter-container::-webkit-scrollbar {
    display: none; /* Chrome, Safari */
}

.filter-btn {
    padding: 8px 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.filter-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    transform: translateY(-2px);
}

.filter-btn.active {
    background: var(--brand-blue);
    color: white;
    border-color: var(--brand-blue);
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

/* 2단계 필터 스타일 */
.sub-filter-container {
    display: none;
    gap: 8px;
    padding: 12px 0;
    margin-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
    align-items: center;
}

.sub-filter-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--brand-blue);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 8px;
}

.sub-filter-btn {
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    color: var(--text-secondary);
    font-size: 0.75rem;
    cursor: pointer;
    transition: var(--transition);
}

.sub-filter-btn:hover {
    background: rgba(255, 255, 255, 0.08);
}

.sub-filter-btn.active {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--brand-blue);
    color: var(--brand-blue);
}

.sub-filter-container.active {
    display: flex !important;
}

#refreshBtn {
    background: rgba(139, 92, 246, 0.15);
    color: var(--brand-purple);
    border-color: rgba(139, 92, 246, 0.3);
}

#refreshBtn:hover {
    background: var(--brand-purple);
    color: white;
}

.avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #475569, #1e293b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 600;
    border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
}

.content-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex-grow: 1;
}

/* Summary Cards */
.summary-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
}

.card {
    padding: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: var(--transition);
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.15);
}

.card-title {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

.card-value {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 8px;
}

.brand-gradient-text {
    background: linear-gradient(135deg, var(--brand-pink), var(--brand-purple));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
}

/* Insight Panel */
.insight-panel {
    padding: 24px 32px;
    margin-bottom: 8px;
    border-left: 4px solid var(--brand-blue);
    background: linear-gradient(90deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
}

.insight-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.insight-header h3 {
    font-size: 1.1rem;
    font-weight: 700;
}

.insight-badge {
    font-size: 0.7rem;
    padding: 4px 10px;
    background: rgba(59, 130, 246, 0.2);
    color: var(--brand-blue);
    border-radius: 20px;
    text-transform: uppercase;
    font-weight: 800;
}

.insight-content {
    font-size: 0.95rem;
    line-height: 1.7;
}

.insight-content strong {
    color: var(--brand-blue);
}

.insight-content ul {
    margin-top: 10px;
    padding-left: 20px;
    color: var(--text-secondary);
}

.insight-content li {
    margin-bottom: 6px;
}

/* 하위 필터
